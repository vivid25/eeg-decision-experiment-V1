<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验准备</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; border-radius: 30px; padding: 60px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); max-width: 600px; text-align: center; }
        .timer { font-size: 80px; font-weight: bold; margin: 10px 0; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>设备调试中</h1>
        <p>请保持放松，EEG/SCR设备正在连接</p>
        <div class="timer" id="timer">03:00</div>
    </div>
    <script>
        let timeLeft = 180;
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerEl.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if (timeLeft <= 0) window.location.href = 'bart.html';
        }, 1000);
    </script>
</body>
</html>
