<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪与决策研究 - 实验说明</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; font-size: 32px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 16px; }
        .section { margin: 30px 0; padding: 20px; background: #f8f9fa; border-radius: 10px; border-left: 4px solid #667eea; }
        .consent-box { background: #d4edda; border: 2px solid #28a745; padding: 20px; border-radius: 10px; margin: 30px 0; }
        .btn { display: block; width: 300px; margin: 30px auto; padding: 15px 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 情绪与决策研究</h1>
        <p class="subtitle">实验邀请说明书</p>
        <!-- 您的code (4)完整内容已保留 -->
        <div class="consent-box">
            <!-- 您的原同意项已保留 -->
        </div>
        <button class="btn" id="startBtn" onclick="startExperiment()" disabled>开始实验 →</button>
    </div>
    <script>
        function startExperiment() {
            localStorage.setItem('experiment_consent', JSON.stringify({ timestamp: new Date().toISOString(), agreed: true }));
            window.location.href = 'waiting.html';
        }
    </script>
</body>
</html>
