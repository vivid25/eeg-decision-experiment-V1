<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验结算 - 最终报酬</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 顶部标题区 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header .subtitle {
            font-size: 18px;
            color: #b8c5d6;
        }
        
        /* 主结果卡片 */
        .main-result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .main-result-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .result-content {
            position: relative;
            z-index: 1;
        }
        
        .result-label {
            font-size: 20px;
            opacity: 0.9;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .total-amount {
            font-size: 90px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: countUp 1s ease;
        }
        
        @keyframes countUp {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .breakdown {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .breakdown-item {
            background: rgba(255,255,255,0.15);
            padding: 20px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            min-width: 150px;
        }
        
        .breakdown-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        .breakdown-value {
            font-size: 28px;
            font-weight: bold;
        }
        
        /* 信息卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease;
            animation-fill-mode: backwards;
        }
        
        .info-card:nth-child(1) { animation-delay: 0.1s; }
        .info-card:nth-child(2) { animation-delay: 0.2s; }
        .info-card:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #f093fb;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-content {
            font-size: 15px;
            line-height: 1.8;
            color: #d1d9e6;
        }
        
        /* 抽签结果展示 */
        .draw-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease 0.4s backwards;
        }
        
        .draw-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #f093fb;
            text-align: center;
        }
        
        .draw-info {
            text-align: center;
            color: #b8c5d6;
            margin-bottom: 25px;
        }
        
        .selected-rounds {
            display: grid;
            gap: 15px;
        }
        
        .round-card {
            background: rgba(255,255,255,0.08);
            border-left: 4px solid #f093fb;
            padding: 20px;
            border-radius: 12px;
            animation: slideIn 0.5s ease;
            animation-fill-mode: backwards;
        }
        
        .round-card:nth-child(1) { animation-delay: 0.6s; }
        .round-card:nth-child(2) { animation-delay: 0.8s; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .round-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .round-type {
            background: rgba(240, 147, 251, 0.2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .round-details {
            font-size: 14px;
            color: #b8c5d6;
            line-height: 1.6;
        }
        
        .reward-highlight {
            color: #4ade80;
            font-weight: bold;
            font-size: 22px;
        }
        
        /* 数据表格 */
        .table-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease 1s backwards;
        }
        
        .table-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #f093fb;
            text-align: center;
        }
        
        .table-container {
            max-height: 400px;
            overflow-y: auto;
            border-radius: 12px;
        }
        
        .table-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .table-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        
        .table-container::-webkit-scrollbar-thumb {
            background: rgba(240, 147, 251, 0.5);
            border-radius: 4px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: rgba(102, 126, 234, 0.3);
            padding: 12px;
            text-align: center;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        
        tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .selected-row {
            background: rgba(240, 147, 251, 0.15) !important;
            border-left: 3px solid #f093fb;
        }
        
        /* 按钮区域 */
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
            animation: slideUp 0.6s ease 1.2s backwards;
        }
        
        .btn {
            padding: 16px 40px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(74, 222, 128, 0.3);
        }
        
        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(74, 222, 128, 0.5);
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #f093fb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header h1 { font-size: 32px; }
            .total-amount { font-size: 60px; }
            .breakdown { flex-direction: column; align-items: center; }
            .buttons { flex-direction: column; align-items: center; }
            .btn { width: 100%; justify-content: center; }
        }
        
        @media print {
            body { background: white; color: black; }
            .btn, .buttons { display: none; }
            .main-result-card { background: #f0f0f0; color: black; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 加载状态 -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="font-size: 18px; color: #b8c5d6;">正在计算最终报酬...</p>
        </div>
        
        <!-- 结果内容 -->
        <div id="result-content" style="display: none;">
            <!-- 顶部标题 -->
            <div class="header">
                <h1>🎉 实验完成</h1>
                <p class="subtitle">感谢您的参与，以下是您的最终报酬</p>
            </div>
            
            <!-- 主结果卡片 -->
            <div class="main-result-card">
                <div class="result-content">
                    <p class="result-label">总报酬</p>
                    <div class="total-amount" id="total-pay">¥0.00</div>
                    
                    <div class="breakdown">
                        <div class="breakdown-item">
                            <div class="breakdown-label">基础报酬</div>
                            <div class="breakdown-value" id="base-pay">¥20.00</div>
                        </div>
                        <div class="breakdown-item">
                            <div class="breakdown-label">绩效奖励</div>
                            <div class="breakdown-value" id="bonus-pay">¥0.00</div>
                        </div>
                        <div class="breakdown-item">
                            <div class="breakdown-label">抽签轮数</div>
                            <div class="breakdown-value">2 轮</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 信息卡片网格 -->
            <div class="cards-grid">
                <div class="info-card">
                    <div class="card-title">
                        <span>📊</span>
                        <span>实验数据汇总</span>
                    </div>
                    <div class="card-content" id="summary-info">
                        正在加载...
                    </div>
                </div>
                
                <div class="info-card">
                    <div class="card-title">
                        <span>💰</span>
                        <span>汇率说明</span>
                    </div>
                    <div class="card-content">
                        <p><strong>10,000 实验币 = 1 元人民币</strong></p>
                        <p style="margin-top: 10px; font-size: 13px; opacity: 0.8;">
                            绩效奖励基于随机抽取的 2 轮任务表现计算，单轮上限 20 元。
                        </p>
                    </div>
                </div>
                
                <div class="info-card">
                    <div class="card-title">
                        <span>⏱️</span>
                        <span>实验时长</span>
                    </div>
                    <div class="card-content" id="duration-info">
                        正在计算...
                    </div>
                </div>
            </div>
            
            <!-- 抽签结果 -->
            <div class="draw-section">
                <div class="draw-title">🎲 抽签结果</div>
                <div class="draw-info">
                    从全部 <strong id="total-rounds">50</strong> 轮任务中随机抽取 <strong>2</strong> 轮作为绩效依据
                </div>
                <div class="selected-rounds" id="selected-rounds"></div>
            </div>
            
            <!-- 详细数据表格 -->
            <div class="table-section">
                <div class="table-title">📋 全部实验数据</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>轮次</th>
                                <th>类型</th>
                                <th>决策详情</th>
                                <th>收益（实验币）</th>
                                <th>兑换（元）</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="buttons">
                <button class="btn btn-primary" onclick="downloadData()">
                    📥 下载实验数据 (JSON)
                </button>
                <button class="btn btn-success" onclick="printResult()">
                    🖨️ 打印结算单
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===== 核心参数 =====
        const EXCHANGE_RATE = 10000;
        const BASE_PAY = 20;
        const MAX_BONUS_PER_ROUND = 20;
        
        let finalResult = null;
        
        // ===== 页面加载 =====
        window.onload = function() {
            try {
                // 读取数据
                const bartDataStr = localStorage.getItem('bart_experiment_data');
                const ddtDataStr = localStorage.getItem('ddt_experiment_data');
                const consentStr = localStorage.getItem('experiment_consent');
                
                if (!bartDataStr || !ddtDataStr) {
                    throw new Error('缺少实验数据！请确保已完成所有实验任务。');
                }
                
                const bartData = JSON.parse(bartDataStr);
                const ddtData = JSON.parse(ddtDataStr);
                const consent = consentStr ? JSON.parse(consentStr) : null;
                
                console.log('BART数据:', bartData);
                console.log('DDT数据:', ddtData);
                
                // 合并数据
                let allRounds = [];
                
                // 添加BART轮次
                bartData.rounds.forEach((round, index) => {
                    allRounds.push({
                        roundNum: index + 1,
                        type: 'BART',
                        detail: round.exploded ? 
                                `爆炸（第${round.pumps}次泵气）` : 
                                `收钱（${round.pumps}次泵气）`,
                        profit: round.profit,
                        rmb: round.profit / EXCHANGE_RATE,
                        timestamp: round.timestamp
                    });
                });
                
                // 添加DDT轮次
                ddtData.rounds.forEach((round, index) => {
                    const typeText = round.choice === 'immediate' ? 
                                    '即时奖励' : 
                                    `延迟奖励${round.failed ? '（系统故障）' : '（已登记）'}`;
                    
                    allRounds.push({
                        roundNum: 30 + index + 1,
                        type: 'DDT',
                        detail: `选择${typeText}`,
                        profit: round.profit,
                        rmb: round.profit / EXCHANGE_RATE,
                        timestamp: round.timestamp
                    });
                });
                
                // 随机抽取2轮
                let selectedIndices = [];
                while (selectedIndices.length < 2) {
                    const idx = Math.floor(Math.random() * allRounds.length);
                    if (!selectedIndices.includes(idx)) {
                        selectedIndices.push(idx);
                    }
                }
                
                // 计算绩效
                let totalBonus = 0;
                let selectedRounds = selectedIndices.map(idx => {
                    const round = allRounds[idx];
                    const reward = Math.min(round.rmb, MAX_BONUS_PER_ROUND);
                    totalBonus += reward;
                    return {
                        ...round,
                        actualReward: reward,
                        index: idx
                    };
                });
                
                // 计算总报酬
                const totalPay = BASE_PAY + totalBonus;
                
                // 计算实验时长
                let duration = '未知';
                if (consent && ddtData.timestamp) {
                    const start = new Date(consent.timestamp);
                    const end = new Date(ddtData.timestamp);
                    const diff = Math.floor((end - start) / 1000 / 60);
                    duration = `约 ${diff} 分钟`;
                }
                
                // 存储最终结果
                finalResult = {
                    totalPay: totalPay,
                    basePay: BASE_PAY,
                    bonusPay: totalBonus,
                    selectedRounds: selectedRounds,
                    allRounds: allRounds,
                    bartProfit: bartData.totalProfit,
                    ddtProfit: ddtData.totalProfit,
                    totalProfit: bartData.totalProfit + ddtData.totalProfit,
                    timestamp: new Date().toISOString(),
                    exchangeRate: EXCHANGE_RATE,
                    duration: duration
                };
                
                // 更新显示
                setTimeout(() => {
                    updateDisplay(finalResult);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('result-content').style.display = 'block';
                }, 800);
                
                // 保存最终结果
                localStorage.setItem('final_result', JSON.stringify(finalResult));
                
            } catch (error) {
                console.error('结算出错:', error);
                alert('数据读取失败！\n\n' + error.message + '\n\n请确保已完成所有实验任务。');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        };
        
        // ===== 更新显示 =====
        function updateDisplay(result) {
            // 更新报酬
            document.getElementById('total-pay').textContent = `¥${result.totalPay.toFixed(2)}`;
            document.getElementById('base-pay').textContent = `¥${result.basePay.toFixed(2)}`;
            document.getElementById('bonus-pay').textContent = `¥${result.bonusPay.toFixed(2)}`;
            document.getElementById('total-rounds').textContent = result.allRounds.length;
            
            // 更新时长
            document.getElementById('duration-info').innerHTML = `
                <p><strong>${result.duration}</strong></p>
                <p style="margin-top: 10px; font-size: 13px; opacity: 0.8;">
                    完成了全部 50 轮任务
                </p>
            `;
            
            // 更新汇总信息
            document.getElementById('summary-info').innerHTML = `
                <p>🎈 BART任务：<strong>${result.bartProfit.toLocaleString()}</strong> 实验币</p>
                <p style="margin-top: 8px;">⏰ 延迟折扣：<strong>${result.ddtProfit.toLocaleString()}</strong> 实验币</p>
                <p style="margin-top: 8px; font-size: 16px;">
                    <strong>总计：${result.totalProfit.toLocaleString()} 实验币</strong>
                </p>
            `;
            
            // 显示抽中的轮次
            const selectedDiv = document.getElementById('selected-rounds');
            selectedDiv.innerHTML = '';
            
            result.selectedRounds.forEach((r, i) => {
                const typeIcon = r.type === 'BART' ? '🎈' : '⏰';
                const upperLimitNote = r.rmb > MAX_BONUS_PER_ROUND ? 
                    ' <span style="color: #fbbf24; font-size: 12px;">(已达上限)</span>' : '';
                
                selectedDiv.innerHTML += `
                    <div class="round-card">
                        <div class="round-header">
                            <span>${typeIcon}</span>
                            <span>第 ${r.roundNum} 轮</span>
                            <span class="round-type">${r.type}</span>
                        </div>
                        <div class="round-details">
                            ${r.detail}<br>
                            收益：<strong>${r.profit.toLocaleString()}</strong> 实验币 → 
                            <span class="reward-highlight">¥${r.actualReward.toFixed(2)}</span>
                            ${upperLimitNote}
                        </div>
                    </div>
                `;
            });
            
            // 填充表格
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            
            result.allRounds.forEach((round, idx) => {
                const isSelected = result.selectedRounds.some(s => s.index === idx);
                const typeIcon = round.type === 'BART' ? '🎈' : '⏰';
                const status = isSelected ? '✓ 已抽中' : '';
                
                tableBody.innerHTML += `
                    <tr class="${isSelected ? 'selected-row' : ''}">
                        <td>${round.roundNum}</td>
                        <td>${typeIcon} ${round.type}</td>
                        <td>${round.detail}</td>
                        <td>${round.profit.toLocaleString()}</td>
                        <td>¥${round.rmb.toFixed(2)}</td>
                        <td>${status}</td>
                    </tr>
                `;
            });
        }
        
        // ===== 下载实验数据 =====
        function downloadData() {
            if (!finalResult) {
                alert('数据尚未准备好！');
                return;
            }
            
            const dataStr = JSON.stringify(finalResult, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `实验结算_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // ===== 打印结算单 =====
        function printResult() {
            window.print();
        }
    </script>
</body>
</html>
