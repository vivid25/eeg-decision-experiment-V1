<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>延迟折扣任务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 700px; margin: 0 auto;
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        
        .info-bar {
            display: flex; justify-content: space-around; background: #f8f9fa;
            padding: 10px; border-radius: 10px; margin-bottom: 20px;
        }
        .info-item { text-align: center; }
        .info-label { font-size: 12px; color: #666; }
        .info-value { font-size: 18px; font-weight: bold; color: #2c3e50; }

        .choice-container {
            display: flex; justify-content: center; gap: 20px; margin: 30px 0;
            flex-wrap: wrap;
        }
        .option {
            border: 2px solid #ddd; border-radius: 15px; padding: 20px;
            width: 200px; text-align: center; cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover { border-color: #3498db; background: #f0f8ff; transform: translateY(-5px); }
        .option h3 { margin-bottom: 10px; color: #555; }
        .amount { font-size: 28px; font-weight: bold; color: #2c3e50; margin: 10px 0; }
        .time { color: #888; font-size: 14px; }
        
        .btn-next {
            display: block; width: 200px; margin: 20px auto; padding: 12px;
            background: #667eea; color: white; text-align: center;
            border: none; border-radius: 25px; font-size: 16px; cursor: pointer;
            font-weight: bold; display: none; /* 初始隐藏 */
        }
        
        .feedback { text-align: center; min-height: 20px; margin: 10px 0; font-weight: bold; }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
        .info { color: #3498db; }
        
        .instructions {
            background: #f8f9fa; padding: 15px; border-radius: 10px;
            margin-top: 20px; font-size: 14px; color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ 延迟折扣任务</h1>
        <p class="subtitle">后20轮 ｜ 跨期权衡</p>
        
        <div class="info-bar">
            <div class="info-item">
                <div class="info-label">轮数</div>
                <div class="info-value" id="round-display">1/20</div>
            </div>
            <div class="info-item">
                <div class="info-label">累计收益</div>
                <div class="info-value" id="total-profit">0</div>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="choice-container" id="choices">
            <div class="option" onclick="select('immediate')">
                <h3>⚡ 即时奖励</h3>
                <div class="amount" id="imm-amt">30000</div>
                <div class="time">今天到账</div>
            </div>
            <div class="option" onclick="select('delayed')">
                <h3>📅 延迟奖励</h3>
                <div class="amount" id="del-amt">-----</div>
                <div class="time">1个月后到账</div>
            </div>
        </div>

        <button class="btn-next" id="btn-next" onclick="nextRound()">下一轮 →</button>

        <div class="instructions">
            <p>说明：请在即时奖励和延迟奖励之间选择一项。</p>
        </div>
    </div>

    <script>
        const IMM = 30000;
        const DEL_MIN = 45000;
        const DEL_MAX = 60000;
        const TOTAL = 20;
        
        let round = 1;
        let totalProfit = 0;
        let currentDel = 0;
        let data = [];
        let failureRounds = [];

        function init() {
            // 检查BART数据
            if (!localStorage.getItem('bart_experiment_data')) {
                alert('请先完成BART任务！');
                window.location.href = 'bart-final.html';
                return;
            }
            const bart = JSON.parse(localStorage.getItem('bart_experiment_data'));
            totalProfit = bart.totalProfit || 0;
            
            // 预设失败轮次
            while(failureRounds.length < 5) {
                let r = Math.floor(Math.random() * 20) + 1;
                if(!failureRounds.includes(r)) failureRounds.push(r);
            }
            
            setupRound();
        }

        function setupRound() {
            currentDel = Math.floor(Math.random() * (DEL_MAX - DEL_MIN + 1)) + DEL_MIN;
            document.getElementById('del-amt').textContent = currentDel;
            document.getElementById('round-display').textContent = `${round}/${TOTAL}`;
            document.getElementById('total-profit').textContent = totalProfit;
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('choices').style.opacity = '1';
            document.getElementById('feedback').textContent = '';
        }

        function select(type) {
            let profit = 0;
            let failed = false;
            let text = '';

            if (type === 'immediate') {
                profit = IMM;
                text = `✅ 获得即时奖励 ${profit} 币`;
            } else {
                if (failureRounds.includes(round)) {
                    failed = true;
                    profit = 0;
                    text = `❌ 系统故障！资金未到账`;
                } else {
                    profit = currentDel;
                    text = `ℹ️ 1个月后到账 ${profit} 币`;
                }
            }

            totalProfit += profit;
            data.push({ round, choice: type, profit, failed });
            
            showFeedback(text, type === 'immediate' ? 'success' : (failed ? 'error' : 'info'));
            
            document.getElementById('choices').style.opacity = '0.5';
            setTimeout(() => {
                document.getElementById('btn-next').style.display = 'block';
            }, 1000);
        }

        function showFeedback(text, cls) {
            const el = document.getElementById('feedback');
            el.textContent = text;
            el.className = 'feedback ' + cls;
        }

        function nextRound() {
            if (round >= TOTAL) {
                finish();
                return;
            }
            round++;
            setupRound();
        }

        function finish() {
            localStorage.setItem('ddt_experiment_data', JSON.stringify({ rounds: data, totalProfit }));
            alert('实验完成！即将进入结算页面。');
            window.location.href = 'payment.html';
        }

        window.onload = init;
    </script>
</body>
</html>
